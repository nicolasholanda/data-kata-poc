x-airflow-env: &airflow-env
  AIRFLOW__CORE__FERNET_KEY: "ZmRrYWxqaGZkczk4N3l3ZWhramRzYmFkOTg3eXdlaGo="
  AIRFLOW__CORE__EXECUTOR: LocalExecutor
  AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-metadata:5432/airflow
  AIRFLOW__API__SECRET_KEY: data-kata-secret-key
  AIRFLOW__CORE__LOAD_EXAMPLES: "false"
  AIRFLOW__CORE__SIMPLE_AUTH_MANAGER_ALL_ADMINS: "true"
  AIRFLOW__CORE__EXECUTION_API_SERVER_URL: "http://airflow-api-server:8080/execution/"
  AIRFLOW__API_AUTH__JWT_SECRET: "data-kata-jwt-secret-key-shared"
  AIRFLOW__OPENLINEAGE__TRANSPORT: '{"type":"http","url":"http://marquez-api:5000","endpoint":"api/v1/lineage"}'
  AIRFLOW__OPENLINEAGE__NAMESPACE: data-kata

services:
  source-db:
    image: postgres:18
    container_name: data-kata-source-db
    environment:
      POSTGRES_DB: salesdb
      POSTGRES_USER: sales_user
      POSTGRES_PASSWORD: sales_pass
    ports:
      - "5432:5432"
    volumes:
      - ./docker/source-db/init.sql:/docker-entrypoint-initdb.d/init.sql

  output-db:
    image: postgres:18
    container_name: data-kata-output-db
    environment:
      POSTGRES_DB: warehousedb
      POSTGRES_USER: warehouse_user
      POSTGRES_PASSWORD: warehouse_pass
    ports:
      - "5433:5432"
    volumes:
      - ./docker/output-db/init.sql:/docker-entrypoint-initdb.d/init.sql

  soap-mock:
    build: ./docker/soap-mock
    container_name: data-kata-soap-mock
    ports:
      - "8090:8090"
      - "8091:8091"

  spark-master:
    image: apache/spark:4.1.1-scala2.13-java21-ubuntu
    container_name: data-kata-spark-master
    ports:
      - "7077:7077"
      - "8081:8080"
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.master.Master

  spark-worker:
    image: apache/spark:4.1.1-scala2.13-java21-ubuntu
    container_name: data-kata-spark-worker
    depends_on:
      - spark-master
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker spark://spark-master:7077
    volumes:
      - ./docker/file-source:/data/files

  airflow-metadata:
    image: postgres:18
    container_name: data-kata-airflow-metadata
    environment:
      POSTGRES_DB: airflow
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow"]
      interval: 10s
      timeout: 5s
      retries: 5

  airflow-init:
    build: ./docker/airflow
    container_name: data-kata-airflow-init
    depends_on:
      airflow-metadata:
        condition: service_healthy
    environment:
      <<: *airflow-env
    restart: "no"
    command: >
      bash -c "
        airflow db migrate &&
        (airflow connections delete spark_default 2>/dev/null || true) &&
        airflow connections add spark_default --conn-type spark --conn-host 'spark://spark-master' --conn-port 7077 &&
        (airflow connections delete source_db 2>/dev/null || true) &&
        airflow connections add source_db --conn-type postgres --conn-host source-db --conn-port 5432 --conn-schema salesdb --conn-login sales_user --conn-password sales_pass &&
        (airflow connections delete warehouse_db 2>/dev/null || true) &&
        airflow connections add warehouse_db --conn-type postgres --conn-host output-db --conn-port 5432 --conn-schema warehousedb --conn-login warehouse_user --conn-password warehouse_pass &&
        (airflow connections delete soap_mock 2>/dev/null || true) &&
        airflow connections add soap_mock --conn-type http --conn-host soap-mock --conn-port 8090 --conn-extra '{\"namespace\": \"http://soapmock.nicolasholanda.github.com/\", \"service_name\": \"SalesmanService\", \"port_name\": \"SalesmanServicePort\"}' &&
        airflow variables set cities_file_path /data/files/cities.csv &&
        airflow variables set products_file_path /data/files/products.csv
      "

  airflow-api-server:
    build: ./docker/airflow
    container_name: data-kata-airflow-api-server
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    environment:
      <<: *airflow-env
    ports:
      - "8082:8080"
    command: airflow api-server
    volumes:
      - ./docker/airflow/dags:/opt/airflow/dags
      - airflow-logs:/opt/airflow/logs

  airflow-dag-processor:
    build: ./docker/airflow
    container_name: data-kata-airflow-dag-processor
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    environment:
      <<: *airflow-env
    command: airflow dag-processor
    volumes:
      - ./docker/airflow/dags:/opt/airflow/dags
      - airflow-logs:/opt/airflow/logs

  airflow-scheduler:
    build: ./docker/airflow
    container_name: data-kata-airflow-scheduler
    hostname: airflow-scheduler
    depends_on:
      airflow-init:
        condition: service_completed_successfully
      spark-master:
        condition: service_started
      marquez-api:
        condition: service_started
    environment:
      <<: *airflow-env
    command: airflow scheduler
    volumes:
      - ./docker/airflow/dags:/opt/airflow/dags
      - ./data-kata-processing/target:/opt/spark-apps
      - ./docker/file-source:/data/files
      - airflow-logs:/opt/airflow/logs

  api:
    image: eclipse-temurin:21-jre
    container_name: data-kata-api
    depends_on:
      - output-db
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://output-db:5432/warehousedb
      SPRING_DATASOURCE_USERNAME: warehouse_user
      SPRING_DATASOURCE_PASSWORD: warehouse_pass
    ports:
      - "8080:8080"
    volumes:
      - ./data-kata-api/target/data-kata-api-1.0.0-SNAPSHOT.jar:/app/app.jar
    command: java -jar /app/app.jar

  marquez-db:
    image: postgres:18
    container_name: data-kata-marquez-db
    environment:
      POSTGRES_DB: marquez
      POSTGRES_USER: marquez
      POSTGRES_PASSWORD: marquez
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U marquez"]
      interval: 10s
      timeout: 5s
      retries: 5

  marquez-api:
    image: marquezproject/marquez:0.50.0
    container_name: data-kata-marquez-api
    depends_on:
      marquez-db:
        condition: service_healthy
    environment:
      MARQUEZ_PORT: 5000
      MARQUEZ_ADMIN_PORT: 5001
      POSTGRES_HOST: marquez-db
      POSTGRES_PORT: 5432
      POSTGRES_DB: marquez
      POSTGRES_USER: marquez
      POSTGRES_PASSWORD: marquez
    ports:
      - "5000:5000"
      - "5001:5001"

  marquez-web:
    image: marquezproject/marquez-web:0.50.0
    container_name: data-kata-marquez-web
    depends_on:
      - marquez-api
    environment:
      MARQUEZ_HOST: marquez-api
      MARQUEZ_PORT: 5000
      WEB_PORT: 3000
    ports:
      - "3000:3000"

volumes:
  airflow-logs:
